name: micah-ci

on:
  pull_request:
    paths:
      - "micah/**"
      - ".github/workflows/micah-ci.yml"
  push:
    branches:
      - main
    paths:
      - "micah/**"

defaults:
  run:
    working-directory: micah

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: micah/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        env:
          MICAH_AUDIT_LOG: "0"
        run: npm test
