name: micah-ci

on:
  pull_request:
    paths:
      - "micah/**"
      - ".github/workflows/micah-ci.yml"
  push:
    branches:
      - main
    paths:
      - "micah/**"

defaults:
  run:
    working-directory: micah

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: micah/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm test
